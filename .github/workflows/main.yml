---
name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

  # Allow job to be triggered manually.
  workflow_dispatch:

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:

  tests-all:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - "ubuntu-22.04"
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.15"
          - "3.15t"
          - "pypy3.11"

    name: Python ${{ matrix.python-version }} on OS ${{ matrix.os }}
    steps:

    - name: Acquire sources
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        activate-environment: true
        enable-cache: true
        cache-suffix: ${{ matrix.python-version }}
        python-version: ${{ matrix.python-version }}

    - name: Install project
      run: |
        uv pip install --editable='.[develop,test]'

    - name: Validate project
      run: |
        poe check

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        fail_ci_if_error: true

  tests-legacy:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - "ubuntu-22.04"
        python-version:
          - "2.7"
          - "3.0"
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "3.5"
          - "3.6"
          - "3.7"

    name: Python ${{ matrix.python-version }} on OS ${{ matrix.os }}
    steps:

    - name: Acquire sources
      uses: actions/checkout@v6

    - name: Install Python
      uses: LizardByte/actions/actions/setup_python@5e0ff2728306b223ce9855abe9f03c84218b4eb0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install project (Python 3.6 and before)
      run: |
        # Python 3.6 does not understand `pyproject.toml` setups,
        # so install the requirements from dedicated file.
        pip install --requirement requirements-test.txt

    - name: Install project (Python 3.7+)
      if: matrix.python-version == '3.7' && matrix.python-version == 'pypy-3.7'
      run: |
        # `setuptools 0.64.0` adds support for editable install hooks (PEP 660).
        # https://github.com/pypa/setuptools/blob/main/CHANGES.rst#v6400
        pip install "setuptools>=64" --upgrade

        # Install package in editable mode.
        pip install --use-pep517 --prefer-binary --editable='.[develop,test]'

    - name: Run software tests
      run: |
        pytest

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        fail_ci_if_error: true
